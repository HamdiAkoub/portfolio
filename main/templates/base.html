<!DOCTYPE html>
{% load static %}
<html lang="en" data-theme="light" x-data="{ darkMode: false, menuOpen: false }" :data-theme="darkMode ? 'dark' : 'light'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hamdi - Portfolio{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-base-200 transition-colors duration-300">

    <div class="navbar bg-base-100 shadow-lg px-4 md:px-8 sticky top-0 z-50">
        <div class="flex-1">
            <a class="btn btn-ghost text-xl font-bold tracking-tighter">Akoub, Hamdi</a>
        </div>

        <div class="flex-none hidden md:flex items-center gap-2">
            <ul class="menu menu-horizontal px-1 font-medium">
                <li><a href="/">Home</a></li>
                <li><a href="/projects">Projects</a></li>
            </ul>
            <button @click="darkMode = !darkMode" class="btn btn-ghost btn-circle">
                <template x-if="!darkMode">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </template>
                <template x-if="darkMode">
                    <svg class="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"/></svg>
                </template>
            </button>
        </div>

        <div class="flex-none md:hidden">
            <button @click="menuOpen = !menuOpen" class="btn btn-square btn-ghost">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
    </div>

    <div x-show="menuOpen" @click.away="menuOpen = false" class="md:hidden bg-base-100 border-b border-base-300 p-4 space-y-2">
        <a href="/" class="block btn btn-ghost justify-start">Home</a>
        <a href="/projects" class="block btn btn-ghost justify-start">Projects</a>
    </div>

    <main class="container mx-auto p-4 md:p-8">
        {% block content %}{% endblock %} </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
